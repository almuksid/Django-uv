<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Django Site{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'day2project/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="{% static 'day2project/css/tiny-slider.css' %}" rel="stylesheet">
    <link href="{% static 'day2project/css/style.css' %}" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include "day2project/common/header.html" %}

    {% block content %}{% endblock %}
    

    {% include "day2project/common/footer.html" %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{% static 'day2project/js/bootstrap.bundle.min.js' %}"></script>
		<script src="{% static 'day2project/js/tiny-slider.js' %}"></script>
		<script src="{% static 'day2project/js/custom.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
